<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PartyOnAir DJ</title>

<style>

body{
background:#111827;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.loginCard,
.card{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin:3px;
}

.googleBtn{
background:#4285F4;
color:white;
}

.youtubeBtn{
background:#ff0000;
color:white;
}

.spotifyBtn{
background:#1DB954;
color:white;
}

.downloadBtn{
background:#22c55e;
color:white;
}

.archiveBtn{
background:#f59e0b;
color:white;
}

.exportBtn{
background:#2563eb;
color:white;
margin-bottom:15px;
}

.search{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:15px;
box-sizing:border-box;
}

.stats{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat{
background:#1f2937;
padding:15px;
border-radius:12px;
flex:1;
min-width:180px;
text-align:center;
}

.hidden{
display:none;
}

.small{
opacity:.8;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div id="loginSection" class="loginCard">

<h1>🎧 PartyOnAir DJ</h1>

<p>Accesso riservato</p>

<button id="loginBtn" class="googleBtn">
Accedi con Google
</button>

<div id="loginError"></div>

</div>

<div id="panel" class="hidden">

<h1>🎧 PartyOnAir DJ</h1>

<button
class="exportBtn"
onclick="exportSongs()">

📄 Esporta lista canzoni

</button>

<div class="stats">

<div class="stat">
<div id="totalSongs">0</div>
<div>Richieste</div>
</div>

<div class="stat">
<div id="totalVotes">0</div>
<div>Voti Totali</div>
</div>

</div>

<input
id="search"
class="search"
placeholder="Cerca canzone..."
>

<div id="songs"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
query,
orderBy,
onSnapshot,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAF3y8cP1hEaIoWlnAiesGhqwI2icL6pLg",
authDomain:"partyonair-f208c.firebaseapp.com",
projectId:"partyonair-f208c",
storageBucket:"partyonair-f208c.firebasestorage.app",
messagingSenderId:"323095980752",
appId:"1:323095980752:web:9fcd2f0626688e13a34cd5"
};

const ALLOWED_UID =
"qJUDuDDR8LYMOOQ1OHYhz7XP2WB3";

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

let allSongs = [];

document
.getElementById("loginBtn")
.addEventListener(
"click",
login
);

async function login(){

try{

const provider =
new GoogleAuthProvider();

const result =
await signInWithPopup(
auth,
provider
);

if(
result.user.uid !==
ALLOWED_UID
){

document.getElementById(
"loginError"
).innerHTML =
"❌ Accesso negato";

return;

}

document
.getElementById(
"loginSection"
)
.classList.add(
"hidden"
);

document
.getElementById(
"panel"
)
.classList.remove(
"hidden"
);

loadSongs();

}
catch(error){

document.getElementById(
"loginError"
).innerHTML =
error.message;

}

}

function loadSongs(){

const q =
query(
collection(
db,
"requests"
),
orderBy(
"votes",
"desc"
)
);

onSnapshot(
q,
(snapshot)=>{

allSongs = [];

snapshot.forEach(
(docSnap)=>{

const data =
docSnap.data();

if(
data.archived
)
return;

allSongs.push({
id:docSnap.id,
...data
});

});

renderSongs();

});

}

function renderSongs(){

const search =
document
.getElementById(
"search"
)
.value
.toLowerCase();

let html = "";

let totalVotes = 0;

const filtered =
allSongs.filter(
song =>
(song.song || "")
.toLowerCase()
.includes(search)
);

filtered.forEach(
song => {

totalVotes +=
song.votes || 0;

const youtube =
`https://www.youtube.com/results?search_query=${encodeURIComponent(song.song)}`;

const spotify =
`https://open.spotify.com/search/${encodeURIComponent(song.song)}`;

html += `
<div class="card">

<h3>
${song.song}
${song.artist ? " - " + song.artist : ""}
</h3>

<div class="small">
👤 ${song.name || "Anonimo"}
</div>

<div>
👍 ${song.votes || 1} voti
</div>

<br>

<a href="${youtube}" target="_blank">
<button class="youtubeBtn">
YouTube
</button>
</a>

<a href="${spotify}" target="_blank">
<button class="spotifyBtn">
Spotify
</button>
</a>

<button
class="downloadBtn"
onclick="markDownloaded('${song.id}')">

${song.downloaded ? "✅ Scaricata" : "⬜ Da scaricare"}

</button>

<button
class="archiveBtn"
onclick="archiveSong('${song.id}')">

🗄️ Archivia

</button>

</div>
`;
  });

document.getElementById(
"songs"
).innerHTML = html;

document.getElementById(
"totalSongs"
).innerHTML =
filtered.length;

document.getElementById(
"totalVotes"
).innerHTML =
totalVotes;

}

document
.getElementById(
"search"
)
.addEventListener(
"input",
renderSongs
);

window.exportSongs = ()=>{

const songs =
[
...new Set(
allSongs
.filter(
song => !song.archived
)
.map(song =>
song.artist
? `${song.song} - ${song.artist}`
: song.song
)
)
];

const text =
songs.join("\n");

const blob =
new Blob(
[text],
{
type:"text/plain"
}
);

const url =
URL.createObjectURL(
blob
);

const a =
document.createElement(
"a"
);

a.href = url;

a.download =
"PartyOnAir-lista-canzoni.txt";

a.click();

URL.revokeObjectURL(
url
);

};

window.markDownloaded =
async(id)=>{

const song =
allSongs.find(
s => s.id === id
);

await updateDoc(
doc(
db,
"requests",
id
),
{
downloaded:
!song.downloaded
}
);

};

window.archiveSong =
async(id)=>{

if(
!confirm(
"Archiviare questa richiesta?"
)
){
return;
}

await updateDoc(
doc(
db,
"requests",
id
),
{
archived:true
}
);

};

</script>

</body>
</html>
