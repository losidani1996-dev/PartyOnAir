<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>PartyOnAir Admin</title>
</head>

<body style="font-family:Arial;padding:40px">

<h1>PartyOnAir Admin</h1>

<button id="loginBtn">
Accedi con Google
</button>

<pre id="result"></pre>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAF3y8cP1hEaIoWlnAiesGhqwI2icL6pLg",
  authDomain: "partyonair-f208c.firebaseapp.com",
  projectId: "partyonair-f208c",
  storageBucket: "partyonair-f208c.firebasestorage.app",
  messagingSenderId: "323095980752",
  appId: "1:323095980752:web:9fcd2f0626688e13a34cd5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", async () => {

  try {

    const provider = new GoogleAuthProvider();

    const result = await signInWithPopup(
      auth,
      provider
    );

    document.getElementById("result").innerText =
`Login riuscito!

Nome: ${result.user.displayName}

Email: ${result.user.email}

UID:
${result.user.uid}`;

  } catch(error) {

    console.error(error);

    document.getElementById("result").innerText =
`Errore:

${error.code}

${error.message}`;

  }

});

</script>

</body>
</html>
