<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp,
query,
where,
getDocs,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAF3y8cP1hEaIoWlnAiesGhqWI2icL6pLg",
authDomain: "partyonair-f208c.firebaseapp.com",
projectId: "partyonair-f208c",
storageBucket: "partyonair-f208c.firebasestorage.app",
messagingSenderId: "323095980752",
appId: "1:323095980752:web:9fcd2f0626688e13a34cd5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.sendRequest = async function(){

const status =
document.getElementById("status");

const song =
document.getElementById("song")
.value
.trim()
.toLowerCase();

const artist =
document.getElementById("artist")
.value
.trim();

const genre =
document.getElementById("genre")
.value;

const name =
document.getElementById("name")
.value
.trim();

if(song === ""){

status.innerHTML =
"⚠️ Inserisci il titolo della canzone";

return;

}

try{

console.log("Cerco canzone:", song);

const existingQuery = query(
collection(db,"requests"),
where("song","==",song)
);

const existingDocs =
await getDocs(existingQuery);

console.log(
"Documenti trovati:",
existingDocs.size
);

if(existingDocs.size > 0){

const existingDoc =
existingDocs.docs[0];

const currentVotes =
existingDoc.data().votes || 1;

await updateDoc(
existingDoc.ref,
{
votes: currentVotes + 1
}
);

status.innerHTML =
"👍 Canzone già presente, voto aggiunto!";

console.log(
"Nuovi voti:",
currentVotes + 1
);

}else{

await addDoc(
collection(db,"requests"),
{
song: song,
artist: artist,
genre: genre,
name: name,
votes: 1,
played: false,
createdAt: serverTimestamp()
}
);

status.innerHTML =
"✅ Richiesta inviata!";

console.log(
"Nuova canzone salvata"
);

}

document.getElementById("song").value = "";
document.getElementById("artist").value = "";
document.getElementById("name").value = "";

}
catch(error){

console.error(error);

status.innerHTML =
"❌ Errore durante l'invio";

}

}

</script>
