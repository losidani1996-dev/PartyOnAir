<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PartyOnAir</title>

<style>

body{
background:#111827;
font-family:Arial,sans-serif;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#1f2937;
padding:25px;
border-radius:15px;
}

h1{
text-align:center;
}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<h1>🎧 PartyOnAir</h1>

<div class="subtitle">
Scrivi la canzone che vuoi ascoltare
</div>

<div class="card">

<input
id="name"
placeholder="Il tuo nome (facoltativo)"
>

<input
id="song"
placeholder="Titolo canzone"
>

<button onclick="sendRequest()">
Invia richiesta
</button>

<div id="status"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAF3y8cP1hEaIoWlnAiesGhqWI2icL6pLg",
authDomain: "partyonair-f208c.firebaseapp.com",
projectId: "partyonair-f208c",
storageBucket: "partyonair-f208c.firebasestorage.app",
messagingSenderId: "323095980752",
appId: "1:323095980752:web:9fcd2f0626688e13a34cd5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.sendRequest = async () => {

const song =
document.getElementById("song").value.trim();

const name =
document.getElementById("name").value.trim();

const status =
document.getElementById("status");

if(!song){

status.innerHTML =
"⚠️ Inserisci una canzone";

return;
}

try{

await addDoc(
collection(db,"requests"),
{
song,
name,
votes:1,
played:false,
createdAt:serverTimestamp()
}
);

status.innerHTML =
"✅ Richiesta inviata!";

document.getElementById("song").value="";

}
catch(e){

console.error(e);

status.innerHTML =
"❌ Errore";

}

};

</script>

</body>
</html>
