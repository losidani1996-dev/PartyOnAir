<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Christian Party</title>

<style>

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#1e293b;
padding:25px;
border-radius:16px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-bottom:15px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.suggestionBox{
background:#111827;
border-radius:10px;
overflow:hidden;
margin-top:-10px;
margin-bottom:15px;
}

.suggestion{
padding:12px;
cursor:pointer;
border-bottom:1px solid #374151;
}

.suggestion:hover{
background:#1f2937;
}

</style>
</head>

<body>

<div class="container">

<h1>🎵 Christian Party</h1>

<div class="subtitle">
Scegli la prossima canzone della serata
</div>

<div class="card">

<input
id="name"
placeholder="Il tuo nome (facoltativo)"
>

<input
id="song"
placeholder="Cerca una canzone..."
autocomplete="off"
>

<div id="suggestions" class="suggestionBox"></div>

<button onclick="sendRequest()">
Invia richiesta
</button>

<div id="status"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp,
query,
where,
getDocs,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAF3y8cP1hEaIoWlnAiesGhqWI2icL6pLg",
authDomain:"partyonair-f208c.firebaseapp.com",
projectId:"partyonair-f208c",
storageBucket:"partyonair-f208c.firebasestorage.app",
messagingSenderId:"323095980752",
appId:"1:323095980752:web:9fcd2f0626688e13a34cd5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedArtist = "";

const songInput =
document.getElementById("song");

const suggestions =
document.getElementById("suggestions");

songInput.addEventListener("input", async ()=>{

const text =
songInput.value.trim();

if(text.length < 3){

suggestions.innerHTML = "";
return;

}

try{

const response =
await fetch(
`https://api.deezer.com/search?q=${encodeURIComponent(text)}&output=jsonp`
);

}catch{}

fetch(
`https://corsproxy.io/?https://api.deezer.com/search?q=${encodeURIComponent(text)}`
)
.then(r=>r.json())
.then(data=>{

suggestions.innerHTML = "";

if(!data.data) return;

data.data.slice(0,8).forEach(track=>{

const div =
document.createElement("div");

div.className = "suggestion";

div.textContent =
`${track.title} - ${track.artist.name}`;

div.onclick = ()=>{

songInput.value =
track.title;

selectedArtist =
track.artist.name;

suggestions.innerHTML = "";

};

suggestions.appendChild(div);

});

})
.catch(()=>{

suggestions.innerHTML = "";

});

});

window.sendRequest = async function(){

const status =
document.getElementById("status");

const song =
songInput.value.trim();

const name =
document.getElementById("name").value.trim();

if(song===""){

status.innerHTML =
"⚠️ Inserisci una canzone";

return;

}

try{

const existingQuery =
query(
collection(db,"requests"),
where("song","==",song.toLowerCase())
);

const existingDocs =
await getDocs(existingQuery);

if(existingDocs.size > 0){

const existingDoc =
existingDocs.docs[0];

const currentVotes =
existingDoc.data().votes || 1;

await updateDoc(
existingDoc.ref,
{
votes: currentVotes + 1
}
);

status.innerHTML =
"👍 Voto aggiunto alla richiesta esistente";

}else{

await addDoc(
collection(db,"requests"),
{
song: song.toLowerCase(),
artist: selectedArtist,
name: name,
votes: 1,
createdAt: serverTimestamp()
}
);

status.innerHTML =
"✅ Richiesta inviata";

}

songInput.value="";
document.getElementById("name").value="";
selectedArtist="";
suggestions.innerHTML="";

}
catch(error){

console.error(error);

status.innerHTML =
"❌ Errore durante l'invio";

}

}

</script>

</body>
</html>
